spring:
  application:
    name: smartPurchase

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8095

smart-purchase:
  pricing:
    platform-fee: 200
    delivery-fee: 250
    vat-rate: 0.15